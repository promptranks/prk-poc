[mypy]
ignore_missing_imports = True

# SQLAlchemy legacy Column() types produce false positives with mypy.
# These modules access Column attributes as if they were plain Python types,
# which is correct at runtime but mypy can't verify without sqlalchemy-stubs.
[mypy-app.services.*]
disable_error_code = index, arg-type, assignment, return-value

[mypy-app.routers.*]
disable_error_code = index, arg-type, assignment, return-value
