services:
  postgres:
    image: postgres:16-alpine
    container_name: prk-poc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-promptranks}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-promptranks-dev}
      POSTGRES_DB: ${POSTGRES_DB:-promptranks}
    ports:
      - "5432:5432"
    volumes:
      - prk-poc-pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-promptranks}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: prk-poc-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: prk-poc-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api/app:/app/app:ro
      - ./content:/app/content:ro
      - ./scripts:/app/scripts:ro

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: prk-poc-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
    depends_on:
      - api

volumes:
  prk-poc-pgdata:
